name: Deploy to Railway
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm install -g @railway/cli
      - run: railway up --service jieleme-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
